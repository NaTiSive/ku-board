name: Deploy Board To Minikube

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify cluster tools
        shell: powershell
        run: |
          kubectl version --client
          minikube version
          minikube status
          minikube addons enable ingress

      - name: Build images inside minikube
        shell: powershell
        run: |
          minikube image build -t board-client:latest ./client
          minikube image build -t board-server:latest ./server

      - name: Apply Kubernetes manifests
        shell: powershell
        run: |
          kubectl apply -f k8s/backend.yaml
          kubectl apply -f k8s/frontend.yaml
          kubectl apply -f k8s/ingress.yaml

      - name: Wait for rollouts
        shell: powershell
        run: |
          kubectl rollout status deployment/board-server --timeout=180s
          kubectl rollout status deployment/board-client --timeout=180s
          kubectl get pods,svc,ingress