apiVersion: apps/v1
kind: Deployment
metadata:
  name: board-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: board-server
  template:
    metadata:
      labels:
        app: board-server
    spec:
      containers:
        - name: server
          image: board-server
          imagePullPolicy: Never
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3001"
            - name: SUPABASE_URL
              value: "https://nripzvcjtoxvjzskejub.supabase.co/"
            - name: CLIENT_URL
              value: "https://board.k8s.dev"
            - name: MAX_FILE_SIZE
              value: "20971520"
            - name: CERT_THAI_FONT_PATH
              value: "/app/fonts/THSarabunNew.ttf"
            - name: GOOGLE_CALLBACK_URL
              value: "https://board.k8s.dev/api/auth/google/callback"
            - name: SUPABASE_ANON_KEY
              valueFrom:
                secretKeyRef:
                  name: board-secrets
                  key: SUPABASE_ANON_KEY
            - name: SUPABASE_SERVICE_ROLE_KEY
              valueFrom:
                secretKeyRef:
                  name: board-secrets
                  key: SUPABASE_SERVICE_ROLE_KEY
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: board-secrets
                  key: GOOGLE_CLIENT_ID
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: board-secrets
                  key: GOOGLE_CLIENT_SECRET
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: board-secrets
                  key: SESSION_SECRET
          ports:
            - containerPort: 3001
---
apiVersion: v1
kind: Service
metadata:
  name: board-server
spec:
  selector:
    app: board-server
  ports:
    - port: 3001
      targetPort: 3001