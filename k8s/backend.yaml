            - name: SUPABASE_SERVICE_ROLE_KEY
              value: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5yaXB6dmNqdG94dmp6c2tlanViIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NTE5NDc0MSwiZXhwIjoyMDkwNzcwNzQxfQ.eUWYdidW_abc07Ocodp2_ndN3Ma2YfsFZNFOmqfVM7Y" # ใส่รหัสเต็มจาก .env
            - name: CLIENT_URL
              value: "https://board.k8s.dev"
            - name: SESSION_SECRET
              value: "development-secret-key"
            - name: MAX_FILE_SIZE
              value: "20971520"
            - name: CERT_THAI_FONT_PATH
